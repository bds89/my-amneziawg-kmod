name: Compile AmneziaWG for FriendlyWrt 24.10.2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Извлечение кода
        uses: actions/checkout@v4

      - name: Установка зависимостей
        run: |
          sudo apt update
          sudo apt install -y build-essential bawk gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Скачивание SDK OpenWrt 24.10.2
        run: |
          # Скачиваем официальный SDK именно для вашей версии 24.10.2 и архитектуры rockchip/armv8
          wget https://openwrt.org
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Подмена vermagic и настройка фидов
        run: |
          cd sdk
          
          # Жестко прописываем ваш хэш ядра в конфигурацию сборки
          echo "CONFIG_KERNEL_MAGICVER=0d90324e4fb76fa1183dcb1f1b600b7a" >> .config
          
          # Добавляем репозиторий AmneziaWG
          echo "src-git amneziawg https://github.com" >> feeds.conf.default
          
          # Обновляем и устанавливаем пакеты
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds update amneziawg
          ./scripts/feeds install -a -p amneziawg

      - name: Выбор пакетов для компиляции
        run: |
          cd sdk
          # Выбираем модуль ядра, утилиты и LuCI как внешние модули (пакеты .ipk)
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=m" >> .config
          
          # Выключаем глобальную подпись пакетов, чтобы роутер не ругался на сторонний ключ
          echo "CONFIG_SIGNED_PACKAGES=" >> .config
          
          make defconfig

      - name: Компиляция пакетов
        run: |
          cd sdk
          # Собираем модуль и сопутствующие утилиты
          make package/kmod-amneziawg/compile V=s
          make package/amneziawg-tools/compile V=s
          make package/luci-proto-amneziawg/compile V=s

      - name: Загрузка готовых пакетов (.ipk)
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-friendlywrt-24.10.2
          # Сохраняем все собранные .ipk файлы
          path: |
            sdk/bin/targets/rockchip/armv8/packages/kmod-amneziawg_*.ipk
            sdk/bin/packages/aarch64_generic/amneziawg/amneziawg-tools_*.ipk
            sdk/bin/packages/aarch64_generic/amneziawg/luci-proto-amneziawg_*.ipk
